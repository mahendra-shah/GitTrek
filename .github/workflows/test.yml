name: GitTrek CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Unit & Component Tests
        run: npm test
        env:
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET || 'ci-test-secret-at-least-32-chars-long-123' }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID || 'dummy-client-id' }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET || 'dummy-client-secret' }}
          GITHUB_REDIRECT_URI: ${{ secrets.GH_REDIRECT_URI || 'http://localhost:5173/api/auth/callback' }}

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET || 'ci-test-secret-at-least-32-chars-long-123' }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID || 'dummy-client-id' }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET || 'dummy-client-secret' }}
          GITHUB_REDIRECT_URI: ${{ secrets.GH_REDIRECT_URI || 'http://localhost:5173/api/auth/callback' }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
